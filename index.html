<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تطبيق الديون</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Tahoma,Arial;
  background:#f5f1e8;
  color:#1b1510;
}
header{
  background:#1b1510;
  color:#d6b06a;
  padding:16px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}
.container{padding:12px;max-width:900px;margin:auto}
.card{
  background:white;
  border-radius:14px;
  padding:14px;
  margin-bottom:12px;
  box-shadow:0 3px 12px #0002;
}
input,select,button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:16px;
}
button{
  background:#1b1510;
  color:white;
  border:none;
  font-weight:bold;
}
.gold{background:#c39e6a;color:#1b1510}
.red{background:#b91c1c}
.green{background:#166534}
.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.item{
  border-bottom:1px solid #eee;
  padding:10px 0;
}
.total{
  font-size:22px;
  font-weight:bold;
  color:#166534;
}
.small{font-size:13px;color:#666}
</style>
</head>

<body>

<header>📒 تطبيق ديون العملاء</header>

<div class="container">

  <div class="card">
    <h3>إضافة عميل</h3>
    <input id="customerName" placeholder="اسم العميل">
    <input id="customerPhone" placeholder="رقم الجوال 05xxxxxxxx">
    <button onclick="addCustomer()" class="gold">حفظ العميل</button>
  </div>

  <div class="card">
    <h3>إضافة دين / منتج</h3>

    <select id="customerSelect"></select>

    <input id="productName" placeholder="اسم المنتج">
    
    <div class="row">
      <input id="price" type="number" placeholder="السعر">
      <input id="qty" type="number" placeholder="الكمية" value="1">
    </div>

    <input id="month" type="month">

    <button onclick="addDebt()">إضافة للعميل</button>
  </div>

  <div class="card">
    <h3>كشف حساب العميل</h3>
    <select id="viewCustomer" onchange="renderDebts()"></select>
    <input id="viewMonth" type="month" onchange="renderDebts()">

    <div id="debtsList"></div>

    <p class="total">الإجمالي: <span id="totalAmount">0</span> ريال</p>

    <button onclick="sendWhatsApp()" class="green">إرسال الكشف واتساب</button>
    <button onclick="window.print()" class="gold">طباعة / حفظ PDF</button>
    <button onclick="clearMonth()" class="red">حذف ديون هذا الشهر</button>
  </div>

</div>

<script>
let customers = JSON.parse(localStorage.getItem("customers") || "[]");
let debts = JSON.parse(localStorage.getItem("debts") || "[]");

const today = new Date();
const currentMonth = today.toISOString().slice(0,7);
document.getElementById("month").value = currentMonth;
document.getElementById("viewMonth").value = currentMonth;

function save(){
  localStorage.setItem("customers", JSON.stringify(customers));
  localStorage.setItem("debts", JSON.stringify(debts));
}

function addCustomer(){
  let name = customerName.value.trim();
  let phone = customerPhone.value.trim();

  if(!name){
    alert("اكتب اسم العميل");
    return;
  }

  customers.push({
    id: Date.now(),
    name,
    phone
  });

  customerName.value="";
  customerPhone.value="";
  save();
  renderCustomers();
}

function renderCustomers(){
  customerSelect.innerHTML="";
  viewCustomer.innerHTML="";

  customers.forEach(c=>{
    customerSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`;
    viewCustomer.innerHTML += `<option value="${c.id}">${c.name}</option>`;
  });

  renderDebts();
}

function addDebt(){
  let customerId = customerSelect.value;
  let product = productName.value.trim();
  let p = Number(price.value);
  let q = Number(qty.value);
  let m = month.value;

  if(!customerId || !product || !p || !q || !m){
    alert("أكمل البيانات");
    return;
  }

  debts.push({
    id: Date.now(),
    customerId,
    product,
    price:p,
    qty:q,
    total:p*q,
    month:m,
    date:new Date().toLocaleDateString("ar-SA")
  });

  productName.value="";
  price.value="";
  qty.value=1;

  save();
  renderDebts();
}

function renderDebts(){
  let customerId = viewCustomer.value;
  let m = viewMonth.value;

  let list = debts.filter(d=>d.customerId == customerId && d.month == m);
  debtsList.innerHTML="";

  let total = 0;

  list.forEach(d=>{
    total += d.total;

    debtsList.innerHTML += `
      <div class="item">
        <b>${d.product}</b><br>
        <span class="small">
          السعر: ${d.price} × الكمية: ${d.qty}
          <br>
          التاريخ: ${d.date}
        </span>
        <br>
        <b>${d.total} ريال</b>
        <button class="red" onclick="deleteDebt(${d.id})">حذف</button>
      </div>
    `;
  });

  totalAmount.innerText = total;
}

function deleteDebt(id){
  if(confirm("حذف العملية؟")){
    debts = debts.filter(d=>d.id !== id);
    save();
    renderDebts();
  }
}

function sendWhatsApp(){
  let customerId = viewCustomer.value;
  let m = viewMonth.value;

  let customer = customers.find(c=>c.id == customerId);
  if(!customer){
    alert("اختر عميل");
    return;
  }

  let list = debts.filter(d=>d.customerId == customerId && d.month == m);
  if(list.length === 0){
    alert("لا يوجد ديون لهذا الشهر");
    return;
  }

  let total = 0;

  let msg = `كشف حساب شهر ${m}%0A`;
  msg += `العميل: ${customer.name}%0A`;
  msg += `--------------------%0A`;

  list.forEach((d,i)=>{
    total += d.total;
    msg += `${i+1}- ${d.product}%0A`;
    msg += `السعر: ${d.price} × الكمية: ${d.qty}%0A`;
    msg += `الإجمالي: ${d.total} ريال%0A`;
    msg += `--------------------%0A`;
  });

  msg += `الإجمالي المطلوب: ${total} ريال%0A`;
  msg += `شكراً لكم`;

  let phone = customer.phone.replace(/\D/g,"");

  if(phone.startsWith("05")){
    phone = "966" + phone.slice(1);
  }

  if(phone){
    window.open(`https://wa.me/${phone}?text=${msg}`, "_blank");
  }else{
    window.open(`https://wa.me/?text=${msg}`, "_blank");
  }
}

function clearMonth(){
  let customerId = viewCustomer.value;
  let m = viewMonth.value;

  if(confirm("حذف كل ديون هذا العميل لهذا الشهر؟")){
    debts = debts.filter(d=>!(d.customerId == customerId && d.month == m));
    save();
    renderDebts();
  }
}

renderCustomers();
</script>

</body>
</html>
